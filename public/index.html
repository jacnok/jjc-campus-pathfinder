<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JJC Campus Pathfinder MVP</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header>
        <p class="eyebrow">MVP scaffold</p>
        <h1>JJC Campus Pathfinder</h1>
        <p class="intro">Search by person name or room number to resolve building, floor, parking, and map markers.</p>
      </header>

      <section class="search-card" aria-label="Search">
        <form id="search-form">
          <label for="search-input">Person or room</label>
          <div class="search-row">
            <input id="search-input" name="q" type="search" placeholder="Pamela Dunn, pam dun, T1063, MC-T 1063" autocomplete="off" />
            <button type="submit">Search</button>
          </div>
        </form>
      </section>

      <section id="result" class="result-card" aria-live="polite"></section>

      <section class="map-card">
        <div id="map"></div>
      </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/app.js" type="module"></script>
  </body>
</html>
